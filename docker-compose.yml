networks:
  dev:

services:
  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    depends_on:
      - client
      - server
    volumes:
      - './nginx.conf:/etc/nginx/nginx.conf'
    networks:
      - dev
  server:
    build: 
      context: ./ClipCloudServer
    networks:
      - dev
    depends_on:
      - redis
  client:
    build: 
      context: ./ClipCloudClient
    networks:
      - dev
    depends_on:
      - server
  redis:
    image: redis:latest
    container_name: redis_container
    ports:
      - "6380:6379"
    volumes:
      - ./redisdata:/data

